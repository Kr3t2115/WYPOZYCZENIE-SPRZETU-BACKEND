/api/equipment/categories/:
  get:
    summary: Pobieranie wszystkich kategorii danego przedmiotu
    tags: [Categories]
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
        description: Strona
        example: 1
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: Limit na stronę
        example: 5
      - name: name
        in: query
        required: false
        schema:
          type: string
        description: Nazwa
        example: Laptopy
      - name: description
        in: query
        required: false
        schema:
          type: string
        description: Opis
        example: Lorem ipsum
    responses:
      200:
        description: Prawidłowe pobranie kategorii
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                      name:
                        type: string
                        example: Laptop
                      description:
                        type: string
                        example: Laptop to bardzo potrzebne narzędzie do nauki, bez niego nie ma bata że zdasz egzaminy u wykładowcy.
                meta:
                    type: object
                    properties:
                            total:
                              type: integer
                              example: 0
                            page:
                              type: integer
                              example: 1
                            limit:
                              type: integer
                              example: 10
                            totalPages:
                              type: integer
                              example: 1
                            hasNextPage:
                              type: boolean
                              example: false
                            hasPrevPage:
                              type: boolean
                              example: true