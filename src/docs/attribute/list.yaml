/api/equipment/attributes:
  get:
    summary: Pobieranie wszystkich atrybutów
    tags: [Attributes]
    responses:
      200:
        description: Prawidłowe pobranie attrybutów
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: 2a849464-9db9-4e64-9ac6-275ded0717f1
                  name:
                    type: string
                    example: RAM
                  type:
                    type: string
                    enum: [TEXT, NUMBER, SELECT, DATE, BOOLEAN]
                    example: NUMBER
                  unit:
                    type: string
                    example: GB