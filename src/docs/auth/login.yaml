/api/auth/login:
  post:
    summary: Logowanie użytkownika
    tags: [Auth]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                example: test@test.pl
              password:
                type: string
                example: mojeHaslo123456
    responses:
      200:
        description: Logowanie udane
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Logowanie udane
      401:
        description: Logowanie nieudane
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Logowanie nieudane